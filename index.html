<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forge - AI Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; color: #e5e5e5; font-family: -apple-system, sans-serif; }
 .file-item { padding: 6px 10px; font-size: 13px; cursor: pointer; display: flex; justify-content: space-between; }
 .file-item:hover { background: #1a1a1a; }
 .file-item.active { background: #2563eb; }
 .file-status { font-size: 10px; padding: 2px 6px; border-radius: 3px; }
 .status-pending { background: #374151; color: #9ca3af; }
 .status-building { background: #1e40af; color: #60a5fa; }
 .status-done { background: #166534; color: #4ade80; }
 .status-error { background: #991b1b; color: #f87171; }
 .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; align-items: center; justify-content: center; }
 .modal-content { background: #1a1a1a; padding: 24px; border-radius: 8px; width: 90%; max-width: 500px; }
  </style>
</head>
<body class="h-screen flex flex-col">
  <div class="flex justify-between items-center p-3 border-b border-gray-800">
    <h1 class="font-bold text-xl">Forge</h1>
    <div class="flex items-center gap-4">
      <div id="creditDisplay" class="text-sm text-gray-400">Loading...</div>
      <button id="settingsBtn" class="text-gray-400 hover:text-white">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106a1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106a1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"></path></svg>
      </button>
    </div>
  </div>

  <div class="flex-1 flex overflow-hidden">
    <div class="w-80 border-r border-gray-800 flex flex-col">
      <div class="p-3 border-b border-gray-800">
        <textarea id="promptInput" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm resize-none" rows="3" placeholder="Build a calculator app..."></textarea>
        <button id="sendBtn" class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded text-sm font-medium">Generate Project</button>
      </div>
      
      <div class="p-3 border-b border-gray-800">
        <div class="text-xs font-bold mb-2">BUILD PLAN</div>
        <div id="buildPlan" class="text-xs text-gray-400">Waiting for prompt...</div>
      </div>
      
      <div class="p-3 border-b border-gray-800">
        <div class="flex justify-between items-center mb-2">
          <div class="text-xs font-bold">PROGRESS</div>
          <div id="buildStatusText" class="text-xs text-gray-500">Idle</div>
        </div>
        <div class="w-full bg-gray-800 rounded-full h-1.5">
          <div id="buildBar" class="bg-blue-600 h-1.5 rounded-full transition-all duration-300" style="width:0%"></div>
        </div>
      </div>
      
      <div class="flex-1 overflow-y-auto">
        <div class="p-3">
          <div class="text-xs font-bold mb-2">FILES</div>
          <div id="fileList" class="text-xs">
            <div class="text-gray-600 text-center py-4">No files yet</div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="flex-1 flex flex-col">
      <div class="p-2 border-b border-gray-800 text-xs font-bold">CODE</div>
      <pre id="output" class="flex-1 p-3 overflow-auto text-xs bg-gray-950">// Select a file to view code</pre>
    </div>
    
    <div class="w-96 border-l border-gray-800 flex flex-col">
      <div class="p-2 border-b border-gray-800 text-xs font-bold">LIVE PREVIEW</div>
      <iframe id="previewFrame" class="flex-1 bg-white"></iframe>
    </div>
  </div>

  <div id="welcomeScreen" class="fixed inset-0 bg-black z-40 flex items-center justify-center">
    <div class="text-center">
      <h2 class="text-3xl font-bold mb-4">Welcome to Forge</h2>
      <p class="text-gray-400 mb-6">Build apps with AI. Set your email to start.</p>
      <button id="welcomeBtn" class="bg-blue-600 px-6 py-2 rounded">Get Started</button>
    </div>
  </div>

  <div id="settingsModal" class="modal">
    <div class="modal-content">
      <h2 class="text-lg font-bold mb-4">Settings</h2>
      <label class="text-sm text-gray-400">Your Email</label>
      <input id="userEmail" type="email" class="w-full bg-gray-900 border border-gray-700 rounded p-2 mt-1 mb-4 text-sm" placeholder="you@email.com">
      <button id="saveEmailBtn" class="w-full bg-blue-600 py-2 rounded text-sm mb-6">Save Email</button>
      <label class="text-sm text-gray-400">BYOK - Bring Your Own Key</label>
      <select id="byokProvider" class="w-full bg-gray-900 border border-gray-700 rounded p-2 mt-1 mb-2 text-sm">
        <option value="">None - Use Forge credits</option>
        <option value="groq">Groq - Fastest</option>
        <option value="openai">OpenAI</option>
        <option value="openrouter">OpenRouter</option>
      </select>
      <input id="byokKey" type="password" class="w-full bg-gray-900 border border-gray-700 rounded p-2 mb-4 text-sm" placeholder="sk-... or gsk_...">
      <button id="saveBYOKBtn" class="w-full bg-gray-700 py-2 rounded text-sm mb-4">Save API Key</button>
      <button id="closeSettingsBtn" class="w-full text-gray-500 text-sm">Close</button>
    </div>
  </div>

  <div id="upgradeModal" class="modal">
    <div class="modal-content">
      <h2 class="text-lg font-bold mb-4">Out of Credits</h2>
      <p id="upgradeMessage" class="text-sm text-gray-400 mb-6"></p>
      <button id="continueFreeBtn" class="w-full bg-gray-700 py-2 rounded text-sm mb-2">Continue with Free</button>
      <button id="upgradeSettingsBtn" class="w-full bg-blue-600 py-2 rounded text-sm">Add API Key for Unlimited</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
