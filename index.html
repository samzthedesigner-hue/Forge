<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Forge - Build Apps with AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }
    .header {
      padding: 16px 20px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .logo { font-size: 20px; font-weight: 700; }
    .watermark {
      font-size: 12px;
      color: #666;
      font-weight: 500;
    }
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 100px;
    }
    .message {
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 80%;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .user-message {
      background: #2563eb;
      align-self: flex-end;
    }
    .ai-message {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      align-self: flex-start;
    }
    .welcome {
      text-align: center;
      margin: auto;
      max-width: 600px;
    }
    .welcome-subtitle {
      color: #999;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .welcome h1 {
      font-size: 34px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fff 0%, #999 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }
    .welcome p {
      color: #999;
      margin-bottom: 24px;
      font-size: 16px;
    }
    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .chip {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chip:active { 
      background: #222; 
      transform: scale(0.98);
    }
    .input-container {
      padding: 16px 20px;
      border-top: 1px solid #222;
      background: #0a0a0a;
      flex-shrink: 0;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
    }
    .input-wrapper {
      display: flex;
      gap: 12px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 24px;
      padding: 12px 16px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 16px;
      resize: none;
      outline: none;
      max-height: 120px;
      font-family: inherit;
      line-height: 1.4;
    }
    textarea::placeholder { color: #666; }
    .send-btn {
      background: #2563eb;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 1;
      transition: background 0.2s;
    }
    .send-btn:active:not(:disabled) {
      background: #1d4ed8;
      transform: scale(0.95);
    }
    .send-btn:disabled {
      background: #333;
      cursor: not-allowed;
      opacity: 0.5;
    }
    .send-btn svg { width: 18px; height: 18px; fill: white; }
    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #666;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Forge</div>
    <div class="watermark">Built by Ceedy | 25 Free Credits</div>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcome">
      <div class="welcome-subtitle">Turn your idea into a real app in seconds</div>
      <h1>What will you build today?</h1>
      <p>Type any app idea. Watch Forge design it live.</p>
      <div class="chips">
        <div class="chip" onclick="setPrompt('AI habit tracker with streaks')">Habit tracker</div>
        <div class="chip" onclick="setPrompt('E-commerce store for sneakers')">Online store</div>
        <div class="chip" onclick="setPrompt('ChatGPT clone with voice input')">AI chatbot</div>
      </div>
    </div>
  </div>

  <div class="input-container">
    <div class="input-wrapper">
      <textarea 
        id="promptInput" 
        placeholder="Describe your app idea..." 
        rows="1"
        onkeydown="handleKeydown(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <script>
    let isLoading = false;

    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    }

    function handleKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function setPrompt(text) {
      document.getElementById('promptInput').value = text;
      sendMessage();
    }

    async function sendMessage() {
      if (isLoading) return;
      
      const input = document.getElementById('promptInput');
      const prompt = input.value.trim();
      if (!prompt) return;

      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      addMessage(prompt, 'user');
      input.value = '';
      input.style.height = 'auto';
      
      isLoading = true;
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<div class="loading"></div>';

      addMessage('Forging your app...', 'ai', true);

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });

        const data = await res.json();
        
        document.querySelector('.ai-message.loading')?.remove();

        if (!res.ok) {
          addMessage(`Error: ${data.error}`, 'ai');
        } else {
          addMessage(data.result, 'ai');
        }
      } catch (error) {
        document.querySelector('.ai-message.loading')?.remove();
        addMessage(`Network error. Try again.`, 'ai');
      }

      isLoading = false;
      sendBtn.disabled = false;
      sendBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>';
      input.focus();
    }

    function addMessage(text, type, loading = false) {
      const container = document.getElementById('chatContainer');
      const msg = document.createElement('div');
      msg.className = `message ${type}-message${loading ? ' loading' : ''}`;
      msg.textContent = text;
      container.appendChild(msg);
      setTimeout(() => {
        container.scrollTop = container.scrollHeight;
      }, 100);
    }

    window.addEventListener('resize', () => {
      const container = document.getElementById('chatContainer');
      container.scrollTop = container.scrollHeight;
    });
  </script>
</body>
</html>
