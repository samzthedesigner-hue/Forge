<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forge</title>
  <link rel="stylesheet" href="/CSS/style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Forge</h1>
      <div class="credits">Free: <span id="creditsCount">25</span></div>
    </header>

    <main class="chat">
      <div id="output"></div>
    </main>

    <div class="input-bar">
      <textarea id="prompt" placeholder="Describe what you want to build..." rows="1"></textarea>
      <button id="sendBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13" stroke="currentColor" stroke-width="2"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
    </div>

    <!-- Mini building animation at bottom -->
    <div id="buildBar" class="build-bar hidden">
      <div class="build-bar-header" id="buildToggle">
        <div class="build-status">
          <div class="pulse"></div>
          <span id="buildStatusText">Building...</span>
        </div>
        <span class="chevron">⌄</span>
      </div>
      <div class="build-progress" id="buildProgress">
        <div class="progress-list" id="fileList"></div>
      </div>
    </div>
  </div>

  <script src="/JS/script.js"></script>
</body>
</html>
